# ─────────────────────────────────────────────────────────────────
# Nginx Configuration
# Acts as a reverse proxy — single entry point for all traffic.
#
# ROUTING RULES:
#   /api/*        → Django backend (port 8000)
#   /ws/*         → Django Channels WebSocket (port 8000)
#   /static/*     → Serve Django static files directly
#   /*            → React frontend (port 3000)
#
# WHY NGINX?
#   - Single domain for both frontend and backend (no CORS issues)
#   - Handles SSL termination in production
#   - Serves static files efficiently
#   - Can handle 10,000+ concurrent connections
# ─────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;  # Max connections per worker
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstream servers ──────────────────────────────────────────
    upstream django_backend {
        server backend:8000;     # Django container
    }

    upstream react_frontend {
        server frontend:3000;    # React container
    }

    # ── Main Server Block ─────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Max upload size
        client_max_body_size 10M;

        # ── API Routes → Django ──────────────────────────────────
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket → Django Channels ──────────────────────────
        location /ws/ {
            proxy_pass http://django_backend;
            proxy_http_version 1.1;
            # These headers enable WebSocket protocol upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Long timeout for persistent WebSocket connections
            proxy_read_timeout 86400;
        }

        # ── Django Admin ─────────────────────────────────────────
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Static Files (Django) ────────────────────────────────
        location /static/ {
            alias /static/;     # Served from shared Docker volume
            expires 30d;        # Cache for 30 days
            add_header Cache-Control "public, immutable";
        }

        # ── React Frontend (everything else) ────────────────────
        location / {
            proxy_pass http://react_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
